{# ── SIDEBAR ── #}
<aside class="h-screen w-64 fixed left-0 top-0 bg-zinc-950/80 backdrop-blur-xl shadow-2xl shadow-black/50 flex flex-col p-6 gap-8 z-50 hidden lg:flex">
  <div class="flex flex-col gap-1">
    <h1 class="text-2xl font-bold tracking-tighter text-blue-500 font-headline">Cinematic</h1>
    <p class="text-xs font-medium text-zinc-500 tracking-widest uppercase">The Canvas</p>
  </div>
  <nav class="flex flex-col gap-2">
    <a class="flex items-center gap-4 px-4 py-3 rounded-lg transition-all duration-300 active:scale-95 text-sm font-medium {% if request.path == '/movies/' %}text-white bg-blue-600/10 scale-105{% else %}text-zinc-500 hover:text-zinc-300 hover:bg-zinc-800/50{% endif %}" href="/movies/">
      <span class="material-symbols-outlined" {% if request.path == '/movies/' %}style="font-variation-settings:'FILL' 1;"{% endif %}>home</span>
      Home
    </a>
    <a class="flex items-center gap-4 px-4 py-3 rounded-lg transition-all duration-300 active:scale-95 text-sm font-medium {% if '/movies/search' in request.path %}text-white bg-blue-600/10 scale-105{% else %}text-zinc-500 hover:text-zinc-300 hover:bg-zinc-800/50{% endif %}" href="/movies/search/">
      <span class="material-symbols-outlined" {% if '/movies/search' in request.path %}style="font-variation-settings:'FILL' 1;"{% endif %}>search</span>
      Search
    </a>
    {% if request.user.is_authenticated %}
    <a class="flex items-center gap-4 px-4 py-3 rounded-lg transition-all duration-300 active:scale-95 text-sm font-medium {% if '/users/profile' in request.path %}text-white bg-blue-600/10 scale-105{% else %}text-zinc-500 hover:text-zinc-300 hover:bg-zinc-800/50{% endif %}" href="/users/profile">
      <span class="material-symbols-outlined" {% if '/users/profile' in request.path %}style="font-variation-settings:'FILL' 1;"{% endif %}>person</span>
      Profile
    </a>
    {% else %}
    <a class="flex items-center gap-4 px-4 py-3 rounded-lg transition-all duration-300 active:scale-95 text-sm font-medium {% if '/users/login' in request.path %}text-white bg-blue-600/10 scale-105{% else %}text-zinc-500 hover:text-zinc-300 hover:bg-zinc-800/50{% endif %}" href="/users/login">
      <span class="material-symbols-outlined" {% if '/users/login' in request.path %}style="font-variation-settings:'FILL' 1;"{% endif %}>login</span>
      Login
    </a>
    {% endif %}
  </nav>
</aside>

{# ── MOBILE BOTTOM NAV ── #}
<nav class="lg:hidden fixed bottom-0 left-0 right-0 z-50 bg-zinc-950/95 backdrop-blur-xl border-t border-zinc-800/80 px-2 py-2">
  <div class="grid grid-cols-3 gap-2">
    <a class="flex flex-col items-center justify-center py-2 rounded-lg text-xs font-medium {% if request.path == '/movies/' %}text-white bg-blue-600/10{% else %}text-zinc-300 hover:bg-zinc-800/60{% endif %}" href="/movies/">
      <span class="material-symbols-outlined" {% if request.path == '/movies/' %}style="font-variation-settings:'FILL' 1;"{% endif %}>home</span>
      Home
    </a>
    <a class="flex flex-col items-center justify-center py-2 rounded-lg text-xs font-medium {% if '/movies/search' in request.path %}text-white bg-blue-600/10{% else %}text-zinc-300 hover:bg-zinc-800/60{% endif %}" href="/movies/search/">
      <span class="material-symbols-outlined" {% if '/movies/search' in request.path %}style="font-variation-settings:'FILL' 1;"{% endif %}>search</span>
      Search
    </a>
    {% if request.user.is_authenticated %}
    <a class="flex flex-col items-center justify-center py-2 rounded-lg text-xs font-medium {% if '/users/profile' in request.path %}text-white bg-blue-600/10{% else %}text-zinc-300 hover:bg-zinc-800/60{% endif %}" href="/users/profile">
      <span class="material-symbols-outlined" {% if '/users/profile' in request.path %}style="font-variation-settings:'FILL' 1;"{% endif %}>person</span>
      Profile
    </a>
    {% else %}
    <a class="flex flex-col items-center justify-center py-2 rounded-lg text-xs font-medium {% if '/users/login' in request.path %}text-white bg-blue-600/10{% else %}text-zinc-300 hover:bg-zinc-800/60{% endif %}" href="/users/login">
      <span class="material-symbols-outlined" {% if '/users/login' in request.path %}style="font-variation-settings:'FILL' 1;"{% endif %}>login</span>
      Login
    </a>
    {% endif %}
  </div>
</nav>
