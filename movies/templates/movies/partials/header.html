  {# ── TOP BAR ── #}
  <header class="fixed top-0 md:top-3 right-0 w-full md:w-[calc(100%-16rem)] z-40 bg-zinc-950/40 backdrop-blur-md flex flex-col md:flex-row md:items-center justify-between px-4 md:px-8 py-3 md:py-2 gap-3 md:gap-0">
    <div class="w-full md:flex-1 md:max-w-md">
      <div class="relative group">
        <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-zinc-500 group-focus-within:text-blue-500 transition-colors">search</span>
        <input
          class="w-full bg-surface-container-high border-none rounded-full py-2 pl-10 pr-4 text-sm focus:ring-1 focus:ring-primary/40 transition-all"
          placeholder="Buscar peliculas y usuarios..."
          type="text"
          onkeydown="if(event.key==='Enter') window.location='/movies/search/?q='+this.value"
        />
      </div>
    </div>
    <div class="flex items-center gap-4 md:gap-6 self-end md:self-auto">
      {% if request.user.is_authenticated %}
      <span class="text-zinc-400 text-xs md:text-sm max-w-28 md:max-w-none truncate">{{ request.user.username }}</span>
      <a href="/logout/" class="text-zinc-400 hover:text-white transition-colors text-sm">Salir</a>
      {% else %}
      <a href="/login/" class="text-zinc-400 hover:text-white transition-colors text-xs md:text-sm">Iniciar sesión</a>
      {% endif %}
    </div>
  </header>
