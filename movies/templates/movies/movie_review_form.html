<div id="modal" _="on closeModal or listChanged remove me"
    class="relative z-50" role="dialog" aria-modal="true">
  
  {# Fondo oscuro #}
  <div class="fixed inset-0 bg-black/70 backdrop-blur-sm"></div>

  {# Modal #}
  <div class="fixed inset-0 z-10 flex items-center justify-center p-4">
    <div class="relative w-full max-w-lg bg-zinc-900 border border-zinc-800 rounded-2xl shadow-2xl p-8">
      
      {# Header #}
      <div class="flex items-center justify-between mb-6">
        <h2 class="text-xl font-bold text-white flex items-center gap-2">
          <span class="material-symbols-outlined text-purple-400">rate_review</span>
          Agregar Reseña
        </h2>
        <button type="button" _="on click trigger closeModal"
          class="text-zinc-500 hover:text-white transition-colors">
          <span class="material-symbols-outlined">close</span>
        </button>
      </div>

      <form hx-post="/movies/movie_review/add/{{ movie.id }}/" hx-target="#modal" hx-swap="outerHTML">
        
        {# Calificación con estrellitas #}
        <div class="mb-5">
          <label class="block text-sm font-medium text-zinc-400 mb-2">Calificación</label>
          <div class="flex gap-2" id="star-rating">
            {% for i in "12345" %}
            <button type="button" onclick="setRating({{ forloop.counter }})"
              class="text-3xl text-zinc-600 hover:text-yellow-400 transition-colors star-btn"
              data-value="{{ forloop.counter }}">★</button>
            {% endfor %}
          </div>
          <input type="hidden" name="rating" id="rating-input" value="">
        </div>

        {# Título #}
        <div class="mb-4">
          <label class="block text-sm font-medium text-zinc-400 mb-2">Título</label>
          <input type="text" name="title"
            class="w-full bg-zinc-800 border border-zinc-700 rounded-lg px-4 py-2 text-white text-sm focus:outline-none focus:ring-1 focus:ring-blue-500"
            placeholder="Dale un título a tu reseña"/>
        </div>

        {# Reseña #}
        <div class="mb-6">
          <label class="block text-sm font-medium text-zinc-400 mb-2">Reseña</label>
          <textarea name="review" rows="4"
            class="w-full bg-zinc-800 border border-zinc-700 rounded-lg px-4 py-2 text-white text-sm focus:outline-none focus:ring-1 focus:ring-blue-500 resize-none"
            placeholder="¿Qué te pareció la película?"></textarea>
        </div>

        {# Botones #}
        <div class="flex justify-end gap-3">
          <button type="button" _="on click trigger closeModal"
            class="px-5 py-2 text-sm font-medium text-zinc-400 hover:text-white transition-colors">
            Cancelar
          </button>
          <button type="submit"
            class="px-6 py-2 bg-blue-600 hover:bg-blue-700 text-white text-sm font-bold rounded-full transition-all hover:scale-105 active:scale-95">
            Guardar
          </button>
        </div>

      </form>
    </div>
  </div>
</div>

<script>
function setRating(value) {
  document.getElementById('rating-input').value = value;
  document.querySelectorAll('.star-btn').forEach((btn, i) => {
    btn.style.color = i < value ? '#facc15' : '#52525b';
  });
}
</script>
