{% load static %}
<header class="fixed top-0 left-0 right-0 h-16 z-40 bg-zinc-950/80 backdrop-blur-md border-b border-zinc-800/50 flex items-center justify-between px-8">
  
  {# Logo #}
  <a href="/movies/" class="flex flex-col leading-tight">
    <span class="text-lg font-extrabold tracking-tighter text-blue-500">Cinematic</span>
    <span class="text-[10px] text-zinc-500 tracking-widest uppercase">The Canvas</span>
  </a>

  {# Buscador #}
  <div class="flex-1 max-w-md mx-8 hidden md:block">
    <div class="relative">
      <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-zinc-500 text-sm">search</span>
      <input
        type="text"
        placeholder="Buscar películas o usuarios..."
        class="w-full bg-zinc-900 border border-zinc-800 rounded-full py-2 pl-10 pr-4 text-sm text-white placeholder-zinc-500 focus:outline-none focus:ring-1 focus:ring-blue-500 transition-all"
        onkeydown="if(event.key==='Enter') window.location='/movies/search/?q='+this.value"
      />
    </div>
  </div>

  {# Usuario #}
  <div class="flex items-center gap-4">
    {% if user.is_authenticated %}
      <span class="text-zinc-400 text-sm hidden md:block">{{ user.username }}</span>
      <a href="/users/logout" class="text-zinc-400 hover:text-white text-sm transition-colors">Salir</a>
    {% else %}
      <a href="/users/register" class="text-zinc-400 hover:text-white text-sm transition-colors hidden md:block">Regístrate</a>
      <a href="/users/login" class="bg-blue-600 hover:bg-blue-700 text-white text-sm font-bold px-4 py-2 rounded-full transition-all hover:scale-105 active:scale-95">
        Iniciar sesión
      </a>
    {% endif %}
  </div>

</header>
